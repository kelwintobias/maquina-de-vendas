name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy-crm:
    name: Deploy CRM (Next.js)
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), '"crm/')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/Maquinadevendascanastra
            git pull origin master

            source crm/.env.build

            sg docker -c "docker build \
              --build-arg NEXT_PUBLIC_FASTAPI_URL=$NEXT_PUBLIC_FASTAPI_URL \
              --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY \
              -t canastra-crm:latest ./crm"

            sg docker -c "docker stack deploy -c crm/docker-compose.yml crm"

            sg docker -c "docker service update \
              --env-add SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY \
              crm_crm"

            echo "CRM deployed successfully"

  deploy-backend:
    name: Deploy Backend (FastAPI)
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified + github.event.commits.*.added + github.event.commits.*.removed), '"backend/')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/Maquinadevendascanastra
            git pull origin master

            sg docker -c "docker build -t canastra-api:latest ./backend"
            sg docker -c "docker stack deploy -c backend/docker-compose.yml canastra"

            echo "Backend deployed successfully"
